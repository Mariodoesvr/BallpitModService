<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<title>Ballpit Moderation</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f14;
    color: white;
}

#dashboard {
    padding: 20px;
}

.card {
    background: #151b23;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    padding: 10px;
    border-bottom: 1px solid #222;
}

.block { color: #ff4d4d; }
.report { color: #ffb84d; }
.accept { color: #4dff88; }
</style>
</head>

<body>

<div id="dashboard">

    <h2>The Ballpit Moderation</h2>

    <div class="card">
        <h3>Total Logs: <span id="totalLogs">0</span></h3>
        <pre id="stats"></pre>
    </div>

    <div class="card">
        <button onclick="clearLogs()">Clear Logs</button>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Player</th>
                    <th>Reason</th>
                    <th>Data</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="logTable"></tbody>
        </table>
    </div>

</div>

<script src="clientWS.js" </script>

</body>
</html>
