<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ballpit Mod Dash</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f14;
    color: white;
}

/* LOGIN */
#loginScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #0b0f14;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#dashboard {
    display: none;
    padding: 20px;
}

input {
    padding: 8px;
    border-radius: 6px;
    border: none;
    margin-top: 5px;
}

button {
    margin-top: 10px;
    padding: 8px 12px;
    background: #2b6cff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.card {
    background: #151b23;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    padding: 10px;
    border-bottom: 1px solid #222;
}

.block { color: #ff4d4d; }
.report { color: #ffb84d; }
.accept { color: #4dff88; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">

    <h1>Ballpit Mod Dash</h1>
    <h3>Moderator Login</h3>

    <!-- GOOGLE SIGN-IN (popup mode = same tab experience) -->
    <div id="g_id_onload"
         data-client_id="YOUR_GOOGLE_CLIENT_ID"
         data-callback="handleGoogleLogin"
         data-auto_prompt="false"
         data-ux_mode="popup">
    </div>

    <div class="g_id_signin"
         data-type="standard"
         data-theme="filled_blue"
         data-size="large">
    </div>

    <hr style="width:200px; margin:20px 0; opacity:0.3;">

    <!-- SECRET CODE -->
    <h3>Use secret code</h3>
    <input id="secretCode" placeholder="Enter code">
    <button id="codeLoginBtn">Login</button>

    <p id="loginStatus"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

    <h2>🛡 Ballpit Mod Dash</h2>

    <div class="card">
        <h3>Total Logs: <span id="totalLogs">0</span></h3>
        <pre id="stats"></pre>
    </div>

    <div class="card">
        <button onclick="clearLogs()">Clear Logs</button>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Player</th>
                    <th>Reason</th>
                    <th>Data</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="logTable"></tbody>
        </table>
    </div>

</div>

<script>
const API = "http://localhost:3000";
let authenticated = false;

/* -------------------------
   GOOGLE LOGIN
--------------------------*/
async function handleGoogleLogin(response) {
    const res = await fetch(API + "/auth", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ token: response.credential })
    });

    const data = await res.json();

    if (data.success) {
        loginSuccess();
    } else {
        document.getElementById("loginStatus").innerText = "Access denied";
    }
}

/* -------------------------
   SECRET CODE LOGIN
--------------------------*/
async function loginWithCode() {
    const code = document.getElementById("secretCode").value;

    if (!code) {
        document.getElementById("loginStatus").innerText = "Enter a code";
        return;
    }

    try {
        const res = await fetch(API + "/code-auth", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ code })
        });

        const data = await res.json();

        if (data.success) {
            loginSuccess();
        } else {
            document.getElementById("loginStatus").innerText = "Invalid code";
        }

    } catch {
        document.getElementById("loginStatus").innerText = "Server error";
    }
}

/* -------------------------
   LOGIN SUCCESS
--------------------------*/
function loginSuccess() {
    authenticated = true;

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    startDashboard();
}

/* -------------------------
   DASHBOARD LOOP
--------------------------*/
function startDashboard() {
    load();
    setInterval(load, 3000);
}

async function load() {
    if (!authenticated) return;

    const logs = await fetch(API + "/logs").then(r => r.json());
    const stats = await fetch(API + "/stats").then(r => r.json());

    document.getElementById("totalLogs").innerText = stats.totalLogs;
    document.getElementById("stats").innerText =
        JSON.stringify(stats.breakdown, null, 2);

    const table = document.getElementById("logTable");
    table.innerHTML = "";

    logs.slice().reverse().forEach(l => {
        const row = document.createElement("tr");

        const cls =
            l.type.includes("block") ? "block" :
            l.type.includes("report") ? "report" :
            "accept";

        row.innerHTML = `
            <td class="${cls}">${l.type}</td>
            <td>${l.playerName}</td>
            <td>${l.reason}</td>
            <td>${l.data || ""}</td>
            <td>${new Date(l.timestamp).toLocaleTimeString()}</td>
        `;

        table.appendChild(row);
    });
}

/* -------------------------
   CLEAR
--------------------------*/
async function clearLogs() {
    await fetch(API + "/clear", { method: "POST" });
    load();
}

/* -------------------------
   BUTTON FIX
--------------------------*/
document.addEventListener("DOMContentLoaded", () => {
    document
        .getElementById("codeLoginBtn")
        .addEventListener("click", loginWithCode);
});
</script>

</body>
</html>
